name: Deploy NowMeet

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf "%s" "${{ secrets.EC2_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -T 30 -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy on server
        run: |
          HOST=$(echo "${{ secrets.EC2_HOST }}" | tr -d '[:space:]')
          ssh -o StrictHostKeyChecking=no \
          -o ConnectTimeout=15 \
          -i ~/.ssh/id_rsa \
          "${{ secrets.EC2_USER }}@${HOST}" << 'EOF'
          set -e
          cd ~/NowMeet
          git fetch origin main
          git reset --hard origin/main
          docker compose down || true
          docker compose up -d --build
          docker system prune -f || true
          EOF